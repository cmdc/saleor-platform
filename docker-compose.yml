services:
  api:
    image: ghcr.io/saleor/saleor:3.22
    ports:
      - 8000:8000
    restart: unless-stopped
    networks:
      - saleor-backend-tier
    stdin_open: true
    tty: true
    depends_on:
      - db
      - cache
      - jaeger
    volumes:
      # shared volume between worker and api for media
      - saleor-media:/app/media
      - ./private.pem:/app/private.pem:ro
    env_file:
      - common.env
      - backend.env
    environment:
      - DASHBOARD_URL=https://app.sophiecoffe.com/
      - ALLOWED_HOSTS=localhost,127.0.0.1,api,app.sophiecoffe.com,api.app.sophiecoffe.com,sophiecoffe.com
      - ALLOWED_CLIENT_HOSTS=app.sophiecoffe.com,sophiecoffe.com

  dashboard:
    image: ghcr.io/saleor/saleor-dashboard:latest
    ports:
      - 9000:80
    restart: unless-stopped
    environment:
      - API_URL=https://api.app.sophiecoffe.com/graphql/

  db:
    image: library/postgres:15-alpine
    ports:
      - 5432:5432
    restart: unless-stopped
    networks:
      - saleor-backend-tier
    volumes:
      - saleor-db:/var/lib/postgresql/data
      - ./replica_user.sql:/docker-entrypoint-initdb.d/replica_user.sql:ro,z
    environment:
      - POSTGRES_USER=saleor
      - POSTGRES_PASSWORD=saleor

  cache:
    image: valkey/valkey:8.1-alpine
    ports:
      - 6379:6379
    restart: unless-stopped
    networks:
      - saleor-backend-tier
    volumes:
      - saleor-cache:/data

  worker:
    image: ghcr.io/saleor/saleor:3.22
    command: celery -A saleor --app=saleor.celeryconf:app worker --loglevel=info -B
    restart: unless-stopped
    networks:
      - saleor-backend-tier
    env_file:
      - common.env
      - backend.env
    depends_on:
      - cache
      # - mailpit
    volumes:
      # shared volume between worker and api for media
      - saleor-media:/app/media
      - ./private.pem:/app/private.pem:ro

  jaeger:
    image: jaegertracing/jaeger
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    restart: unless-stopped
    networks:
      - saleor-backend-tier
    volumes:
      - type: tmpfs
        target: /tmp

  # mailpit:
  #   image: axllent/mailpit
  #   ports:
  #     - 1025:1025 # smtp server
  #     - 8025:8025 # web ui. Visit http://localhost:8025/ to check emails
  #   restart: unless-stopped
  #   networks:
  #     - saleor-backend-tier

  dynamodb-local:
    image: amazon/dynamodb-local
    command: "-jar DynamoDBLocal.jar -sharedDb"
    restart: unless-stopped
    networks:
      - saleor-backend-tier
    healthcheck:
      test: ["CMD-SHELL", "echo ok"]
      interval: 5s
      timeout: 3s
      retries: 10

  dynamodb-init:
    image: amazon/aws-cli
    depends_on:
      dynamodb-local:
        condition: service_healthy
    entrypoint: /bin/sh
    command: >-
      -c "aws --endpoint-url http://dynamodb-local:8000 dynamodb create-table --table-name stripe-main-table --attribute-definitions AttributeName=PK,AttributeType=S AttributeName=SK,AttributeType=S --key-schema AttributeName=PK,KeyType=HASH AttributeName=SK,KeyType=RANGE --billing-mode PAY_PER_REQUEST --region local || true && aws --endpoint-url http://dynamodb-local:8000 dynamodb create-table --table-name products-feed-main-table --attribute-definitions AttributeName=PK,AttributeType=S AttributeName=SK,AttributeType=S --key-schema AttributeName=PK,KeyType=HASH AttributeName=SK,KeyType=RANGE --billing-mode PAY_PER_REQUEST --region local || true"
    environment:
      - AWS_ACCESS_KEY_ID=local
      - AWS_SECRET_ACCESS_KEY=local
      - AWS_DEFAULT_REGION=local
    networks:
      - saleor-backend-tier

  stripe-app:
    image: cmdcbusiness/saleor-stripe-app:latest
    container_name: stripe-app
    restart: unless-stopped
    env_file:
      - stripe-app.env
    depends_on:
      dynamodb-init:
        condition: service_completed_successfully
    networks:
      - saleor-backend-tier
      - nginx-proxy

  products-feed-app:
    image: cmdcbusiness/saleor-products-feed-app:latest
    container_name: products-feed-app
    restart: unless-stopped
    env_file:
      - products-feed-app.env
    depends_on:
      dynamodb-init:
        condition: service_completed_successfully
    networks:
      - saleor-backend-tier
      - nginx-proxy

volumes:
  saleor-db:
    driver: local
  saleor-cache:
    driver: local
  saleor-media:

networks:
  saleor-backend-tier:
    driver: bridge
  nginx-proxy:
    external: true
